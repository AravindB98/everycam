name: registry

# Validate community data contributions on every PR that touches the registry.
on:
  pull_request:
    paths: ["registry/**"]
  push:
    branches: [main]
    paths: ["registry/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data]"
      - name: Validate registry (consent + license + anonymization + schema)
        run: everycam validate --registry registry
