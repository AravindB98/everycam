<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="980" height="260" fill="#0d1117"/>
  <text x="490" y="34" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">EveryCam pipeline</text>
  <text x="490" y="56" text-anchor="middle" fill="#8b949e" font-size="13">every camera &#8594; privacy-first, robot-ready embodied data</text>

  <!-- stage boxes -->
  <g>
    <rect x="14"  y="96" width="148" height="92" rx="12" fill="#161b22" stroke="#2f81f7" stroke-width="2"/>
    <text x="88"  y="126" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Everyday camera</text>
    <text x="88"  y="146" text-anchor="middle" fill="#8b949e" font-size="9.5">webcam · phone</text>
    <text x="88"  y="160" text-anchor="middle" fill="#8b949e" font-size="9.5">dashcam · fixed/CCTV</text>
    <text x="88"  y="174" text-anchor="middle" fill="#8b949e" font-size="9.5">glasses · files</text>

    <rect x="180" y="96" width="148" height="92" rx="12" fill="#161b22" stroke="#f778ba" stroke-width="2"/>
    <text x="254" y="126" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Privacy gate</text>
    <text x="254" y="148" text-anchor="middle" fill="#8b949e" font-size="9.5">blur faces + plates</text>
    <text x="254" y="162" text-anchor="middle" fill="#8b949e" font-size="9.5">BEFORE storage</text>
    <text x="254" y="176" text-anchor="middle" fill="#f778ba" font-size="9.5">no identity, ever</text>

    <rect x="346" y="96" width="148" height="92" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="420" y="126" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Perception</text>
    <text x="420" y="148" text-anchor="middle" fill="#8b949e" font-size="9.5">hands · objects</text>
    <text x="420" y="162" text-anchor="middle" fill="#8b949e" font-size="9.5">ego-motion</text>
    <text x="420" y="176" text-anchor="middle" fill="#8b949e" font-size="9.5">(MediaPipe / fallback)</text>

    <rect x="512" y="96" width="148" height="92" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="586" y="122" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Embodied signals</text>
    <text x="586" y="144" text-anchor="middle" fill="#8b949e" font-size="9.5">hand &#8594; proxy</text>
    <text x="586" y="158" text-anchor="middle" fill="#8b949e" font-size="9.5">end-effector actions</text>
    <text x="586" y="172" text-anchor="middle" fill="#8b949e" font-size="9.5">grasp affordances</text>

    <rect x="678" y="96" width="148" height="92" rx="12" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="752" y="126" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">LeRobot-style</text>
    <text x="752" y="142" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">dataset</text>
    <text x="752" y="162" text-anchor="middle" fill="#8b949e" font-size="9.5">parquet + images</text>
    <text x="752" y="176" text-anchor="middle" fill="#8b949e" font-size="9.5">+ provenance</text>

    <rect x="844" y="96" width="124" height="92" rx="12" fill="#161b22" stroke="#a371f7" stroke-width="2"/>
    <text x="906" y="126" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Tiny model</text>
    <text x="906" y="148" text-anchor="middle" fill="#8b949e" font-size="9.5">grasp + contact</text>
    <text x="906" y="162" text-anchor="middle" fill="#8b949e" font-size="9.5">CPU, seconds</text>
    <text x="906" y="176" text-anchor="middle" fill="#8b949e" font-size="9.5">runs anywhere</text>
  </g>

  <!-- arrows -->
  <g fill="#8b949e">
    <polygon points="162,142 180,142 174,136 174,148"/>
    <polygon points="328,142 346,142 340,136 340,148"/>
    <polygon points="494,142 512,142 506,136 506,148"/>
    <polygon points="660,142 678,142 672,136 672,148"/>
    <polygon points="826,142 844,142 838,136 838,148"/>
  </g>

  <text x="490" y="226" text-anchor="middle" fill="#6e7681" font-size="11">Runs end-to-end on any laptop — no robot, no GPU, no network required.</text>
</svg>
